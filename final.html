<!DOCTYPE html>

<head>

    <style>
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Consolas', 'Lucida Console', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .terminal-window {
            width: 1000px;
            background-color: #0C0C0C;
            border: 1px solid #3c3c3c;
            border-radius: 6px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .terminal-header {
            background-color: #2d2d2d;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3c3c3c;
            user-select: none;
        }

        .terminal-title {
            font-size: 12px;
            color: #aaaaaa;
        }

        .window-controls { display: flex; gap: 8px; }
        .control-btn { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .btn-close { background-color: #ff5f56; }
        .btn-min { background-color: #ffbd2e; }
        .btn-max { background-color: #27c93f; }

        .terminal-body {
            padding: 15px;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre;
            color: #CCCCCC;
        }

        /* Цветовая палитра ANSI-состояний */
        .c-green  { color: #00FF00; font-weight: bold; }
        .c-cyan   { color: #00FFFF; font-weight: bold; }
        .c-yellow { color: #FFFF00; font-weight: bold; }
        .c-orange { color: #FF8000; font-weight: bold; } /* Оранжевый акцент безопасности */
        .c-red    { color: #FF3333; font-weight: bold; }
        .c-purple { color: #E066FF; font-weight: bold; }
        .c-gray   { color: #555555; }
        .c-white  { color: #FFFFFF; font-weight: bold; }

        .inverse-green { background-color: #00FF00; color: #000; font-weight: bold; }
        
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
